<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weltraum Flug-Simulator</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; user-select: none; }
        #instructions {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer;
            text-align: center; z-index: 10;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 6px; height: 6px; background: rgba(255,255,255,0.5);
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 5;
        }
        .btn {
            background: #007acc; padding: 12px 24px; font-size: 18px;
            color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 15px;
        }
    </style>
</head>
<body>
    <div id="instructions">
        <h1>Weltraum-Simulator bereit</h1>
        <p>W = Vorwärts fliegen | S = Rückwärts fliegen</p>
        <p>A / D = Seitwärts schweben | Maus = In alle Richtungen steuern/umsehen</p>
        <p>Leertaste = Nach oben steigen | Shift = Nach unten sinken</p>
        <button class="btn">Triebwerke starten</button>
    </div>
    <div id="crosshair"></div>

    <canvas id="spaceCanvas"></canvas>

    <script>
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');

        let w = window.innerWidth, h = window.innerHeight;
        canvas.width = w; canvas.height = h;

        // Spieler-Position und Flug-Ausrichtung (Blickwinkel)
        const player = { x: 0, y: 0, z: 20, yaw: 0, pitch: 0 };
        const keys = { w: 0, s: 0, a: 0, d: 0, space: 0, shift: 0 };

        // 1. Skybox: Feste Sterne im Raum generieren
        const stars = [];
        for(let i = 0; i < 400; i++) {
            stars.push({
                x: (Math.random() - 0.5) * 600,
                y: (Math.random() - 0.5) * 600,
                z: (Math.random() - 0.5) * 600,
                size: 0.5 + Math.random() * 1.5
            });
        }

        // 2. Planeten mit verschiedenen Stilen generieren
        const planets = [];
        const planetStyles = [
            { c: '#bf8d3c', hasRing: true },  // Saturn-Stil
            { c: '#2b82c9', hasRing: false }, // Erd-Stil
            { c: '#c1440e', hasRing: false }, // Mars-Stil
            { c: '#4f725d', hasRing: false }, // Giftwelt
            { c: '#a5a5a5', hasRing: true }   // Eisplanet
        ];

        for(let i = 0; i < 30; i++) {
            const style = planetStyles[Math.floor(Math.random() * planetStyles.length)];
            planets.push({
                x: (Math.random() - 0.5) * 250,
                y: (Math.random() - 0.5) * 250,
                z: (Math.random() - 0.5) * 250,
                r: 4 + Math.random() * 8, // Radius
                c: style.c,
                hasRing: style.hasRing
            });
        }

        // Steuerung sperren (Pointer Lock)
        const inst = document.getElementById('instructions');
        let locked = false;

        inst.addEventListener('click', () => { canvas.requestPointerLock(); });
        document.addEventListener('pointerlockchange', () => {
            locked = document.pointerLockElement === canvas;
            inst.style.display = locked ? 'none' : 'flex';
        });

        // Maus-Rotation (Pitch = Hoch/Runter, Yaw = Links/Rechts)
        document.addEventListener('mousemove', (e) => {
            if (!locked) return;
            player.yaw -= e.movementX * 0.0025;
            player.pitch -= e.movementY * 0.0025;
            player.pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, player.pitch));
        });

        // Tastatur-Abfrage für Bewegung
        window.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') keys.w = 1;
            if(e.code === 'KeyS') keys.s = 1;
            if(e.code === 'KeyA') keys.a = 1;
            if(e.code === 'KeyD') keys.d = 1;
            if(e.code === 'Space') keys.space = 1;
            if(e.code === 'ShiftLeft' || e.code === 'ShiftRight') keys.shift = 1;
        });

        window.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') keys.w = 0;
            if(e.code === 'KeyS') keys.s = 0;
            if(e.code === 'KeyA') keys.a = 0;
            if(e.code === 'KeyD') keys.d = 0;
            if(e.code === 'Space') keys.space = 0;
            if(e.code === 'ShiftLeft' || e.code === 'ShiftRight') keys.shift = 0;
        });

        window.addEventListener('resize', () => {
            w = window.innerWidth; h = window.innerHeight;
            canvas.width = w; canvas.height = h;
        });
          // --- 3D-FLUGPHYSIK & RENDERING ENGINE ---
        function loop() {
            // 1. Position aktualisieren basierend auf Blickrichtung
            if (locked) {
                let speed = 0.35;

                let cosPitch = Math.cos(player.pitch);
                let sinPitch = Math.sin(player.pitch);
                let cosYaw = Math.cos(player.yaw);
                let sinYaw = Math.sin(player.yaw);

                // Blickrichtungs-Vektoren berechnen
                let forwardX = sinYaw * cosPitch;
                let forwardY = sinPitch;
                let forwardZ = -cosYaw * cosPitch;

                // Seitwärts-Vektoren berechnen
                let strafeX = cosYaw;
                let strafeZ = sinYaw;

                // Tausch der Achsen: W erhöht den Vorwärtsdrang, S verringert ihn
                let moveForward = keys.w - keys.s;
                let moveStrafe = keys.d - keys.a;
                let moveVertical = keys.space - keys.shift;

                // Bewegung auf allen drei Achsen anwenden (Vorzeichen für W/S korrigiert)
                player.x += (forwardX * moveForward + strafeX * moveStrafe) * speed;
                player.y += (forwardY * moveForward + moveVertical) * speed;
                player.z += (forwardZ * moveForward + strafeZ * moveStrafe) * speed;
            }

            // Canvas für neuen Frame leeren
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, w, h);

            let fov = 450;

            // 2. Sterne der Skybox zeichnen
            ctx.fillStyle = '#ffffff';
            stars.forEach(star => {
                let dx = star.x - player.x;
                let dy = star.y - player.y;
                let dz = star.z - player.z;

                // 3D-Kamera-Rotation anwenden
                let r1x = dx * Math.cos(-player.yaw) - dz * Math.sin(-player.yaw);
                let r1z = dx * Math.sin(-player.yaw) + dz * Math.cos(-player.yaw);
                let r2y = dy * Math.cos(-player.pitch) - r1z * Math.sin(-player.pitch);
                let r2z = dy * Math.sin(-player.pitch) + r1z * Math.cos(-player.pitch);

                if (r2z > 1) {
                    let sx = w / 2 + (r1x * fov) / r2z;
                    let sy = h / 2 + (r2y * fov) / r2z;
                    if (sx >= 0 && sx <= w && sy >= 0 && sy <= h) {
                        ctx.fillRect(sx, sy, star.size, star.size);
                    }
                }
            });

            // 3. Planeten transformieren und projizieren
            const renderedPlanets = [];

            planets.forEach(p => {
                let dx = p.x - player.x;
                let dy = p.y - player.y;
                let dz = p.z - player.z;

                let r1x = dx * Math.cos(-player.yaw) - dz * Math.sin(-player.yaw);
                let r1z = dx * Math.sin(-player.yaw) + dz * Math.cos(-player.yaw);
                let r2y = dy * Math.cos(-player.pitch) - r1z * Math.sin(-player.pitch);
                let r2z = dy * Math.sin(-player.pitch) + r1z * Math.cos(-player.pitch);

                if (r2z > 2) {
                    renderedPlanets.push({ p, rx: r1x, ry: r2y, rz: r2z });
                }
            });

            // Objekte nach Entfernung sortieren (Painter's Algorithm)
            renderedPlanets.sort((a, b) => b.rz - a.rz);

            // 4. Planeten zeichnen
            renderedPlanets.forEach(({ p, rx, ry, rz }) => {
                let scale = fov / rz;
                let sx = w / 2 + rx * scale;
                let sy = h / 2 + ry * scale;
                let radius = p.r * scale;

                if (radius > 1) {
                    // Planetensystemringe zeichnen falls aktiv
                    if (p.hasRing) {
                        ctx.beginPath();
                        ctx.ellipse(sx, sy, radius * 1.8, radius * 0.4, Math.PI / 6, 0, 2 * Math.PI);
                        ctx.strokeStyle = 'rgba(210, 190, 150, 0.5)';
                        ctx.lineWidth = radius * 0.15;
                        ctx.stroke();
                    }

                    // Planetenkörper zeichnen
                    ctx.beginPath();
                    ctx.arc(sx, sy, radius, 0, 2 * Math.PI);
                    ctx.fillStyle = p.c;
                    ctx.fill();

                    // Sphärische 3D-Lichtstrahlung simulieren
                    let gradient = ctx.createRadialGradient(
                        sx - radius * 0.2, sy - radius * 0.2, radius * 0.05,
                        sx, sy, radius
                    );
                    gradient.addColorStop(0, 'rgba(255,255,255,0.25)');
                    gradient.addColorStop(0.6, 'rgba(0,0,0,0)');
                    gradient.addColorStop(1, 'rgba(0,0,0,0.85)');
                    
                    ctx.beginPath();
                    ctx.arc(sx, sy, radius, 0, 2 * Math.PI);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                }
            });

            requestAnimationFrame(loop);
        }

        // Spielschleife starten
        loop();
    </script>
</body>
</html>
