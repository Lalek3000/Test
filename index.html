<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein 3D Web-Spiel</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #111; }
        #instructions {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer;
            text-align: center; padding: 20px; box-sizing: border-box;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; background: white;
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; mix-blend-mode: difference;
        }
        .error-box { background: #ff3333 !important; color: white !important; cursor: default !important; }
    </style>
</head>
<body>
    <div id="instructions">
        <h1>Klicken zum Spielen</h1>
        <p>W, A, S, D = Bewegen | Maus = Umsehen | Leertaste = Springen</p>
    </div>
    <div id="crosshair"></div>

    <!-- Neue, stabilere CDN Links direkt über UNPKG (GitHub-Spiegelung) -->
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>

    <script>
        // Sicherheits-Check: Prüfen ob Three.js erfolgreich geladen wurde
        if (typeof THREE === 'undefined') {
            const info = document.getElementById('instructions');
            info.className = 'error-box';
            info.innerHTML = '<h1>Fehler beim Laden!</h1><p>Die 3D-Bibliothek konnte nicht geladen werden. Bitte überprüfe deine Internetverbindung oder lade die Seite neu.</p>';
        } else {
            // 1. Szene, Kamera und Renderer Setup
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0xefd1b5);
            scene.fog = new THREE.FogExp2(0xefd1b5, 0.015);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 2;

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // 2. Lichtquellen
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(20, 40, 20);
            dirLight.castShadow = true;
            scene.add(dirLight);

            // 3. Boden und Volumenkörper
            const floorGeo = new THREE.PlaneGeometry(100, 100);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x33aa33 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            const geometries = [
                new THREE.BoxGeometry(2, 2, 2),
                new THREE.CylinderGeometry(1, 1, 3, 16),
                new THREE.SphereGeometry(1.5, 32, 32)
            ];
            const colors = [0xff0000, 0x0000ff, 0xffff00, 0xff00ff];

            for (let i = 0; i < 20; i++) {
                const geo = geometries[Math.floor(Math.random() * geometries.length)];
                const mat = new THREE.MeshStandardMaterial({ color: colors[Math.floor(Math.random() * colors.length)] });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set((Math.random() - 0.5) * 40, 1.5, (Math.random() - 0.5) * 40);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                scene.add(mesh);
            }

            // 4. Steuerung (PointerLock)
            const controls = new THREE.PointerLockControls(camera, document.body);
            const instructions = document.getElementById('instructions');

            instructions.addEventListener('click', () => controls.lock());
            controls.addEventListener('lock', () => instructions.style.display = 'none');
            controls.addEventListener('unlock', () => instructions.style.display = 'flex');

            // 5. Tastatur & Physik
            const keys = { w: false, a: false, s: false, d: false };
            const velocity = new THREE.Vector3();
            const direction = new THREE.Vector3();
            let canJump = false;
            let prevTime = performance.now();

            window.addEventListener('keydown', (e) => {
                if (e.code === 'KeyW') keys.w = true;
                if (e.code === 'KeyA') keys.a = true;
                if (e.code === 'KeyS') keys.s = false || (keys.s = true); // Fix für Mehrfachtasten
                if (e.code === 'KeyD') keys.d = true;
                if (e.code === 'Space' && canJump) { velocity.y += 12; canJump = false; }
            });

            window.addEventListener('keyup', (e) => {
                if (e.code === 'KeyW') keys.w = false;
                if (e.code === 'KeyA') keys.a = false;
                if (e.code === 'KeyS') keys.s = false;
                if (e.code === 'KeyD') keys.d = false;
            });

            // 6. Game Loop
            function animate() {
                requestAnimationFrame(animate);

                if (controls.isLocked === true) {
                    const time = performance.now();
                    const delta = (time - prevTime) / 1000;

                    velocity.x -= velocity.x * 10.0 * delta;
                    velocity.z -= velocity.z * 10.0 * delta;
                    velocity.y -= 9.8 * 3.5 * delta; // Schwerkraft

                    direction.z = Number(keys.w) - Number(keys.s);
                    direction.x = Number(keys.d) - Number(keys.a);
                    direction.normalize();

                    if (keys.w || keys.s) velocity.z -= direction.z * 80.0 * delta;
                    if (keys.a || keys.d) velocity.x -= direction.x * 80.0 * delta;

                    controls.moveRight(-velocity.x * delta);
                    controls.moveForward(-velocity.z * delta);

                    camera.position.y += (velocity.y * delta);

                    if (camera.position.y < 2) {
                        velocity.y = 0;
                        camera.position.y = 2;
                        canJump = true;
                    }

                    prevTime = time;
                }

                renderer.render(scene, camera);
            }

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        }
    </script>
</body>
</html>
