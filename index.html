<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Autarkes 3D-Spiel</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #111; user-select: none; }
        #instructions {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer;
            text-align: center;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 8px; height: 8px; background: white;
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; mix-blend-mode: difference;
        }
        .btn {
            background: #007acc; padding: 12px 24px; font-size: 18px;
            color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 15px;
        }
    </style>
</head>
<body>
    <div id="instructions">
        <h1>3D-Welt bereit</h1>
        <p>W, A, S, D = Bewegen | Maus = Umsehen | Leertaste = Springen</p>
        <button class="btn">Spiel starten</button>
    </div>
    <div id="crosshair"></div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let w = window.innerWidth, h = window.innerHeight;
        canvas.width = w; canvas.height = h;

        // Spieler-Status (Startposition und physikalische Werte)
        const player = { x: 0, y: 1.8, z: 15, rx: 0, ry: 0, vy: 0, onGround: true };
        const keys = { w: 0, a: 0, s: 0, d: 0 };

        // Zufällige Volumenkörper im Raum platzieren
        const objects = [];
        const colors = ['#ff4444', '#44ff44', '#4444ff', '#ff00ff', '#ffff00', '#00ffff'];
        for(let i = 0; i < 40; i++) {
            objects.push({
                x: (Math.random() - 0.5) * 80,
                z: (Math.random() - 0.5) * 80,
                w: 1.5 + Math.random() * 2,
                h: 2.0 + Math.random() * 5,
                d: 1.5 + Math.random() * 2,
                c: colors[Math.floor(Math.random() * colors.length)]
            });
        }

        // Maus-Sperre (Pointer Lock) steuern
        const inst = document.getElementById('instructions');
        let locked = false;

        inst.addEventListener('click', () => { canvas.requestPointerLock(); });

        document.addEventListener('pointerlockchange', () => {
            locked = document.pointerLockElement === canvas;
            inst.style.display = locked ? 'none' : 'flex';
        });

        // Mausbewegung für die Kamera (Blickrichtung)
        document.addEventListener('mousemove', (e) => {
            if (!locked) return;
            player.ry -= e.movementX * 0.003; // Links/Rechts drehen
            player.rx -= e.movementY * 0.003; // Hoch/Runter schauen
            player.rx = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, player.rx));
        });

        // Tastatur abfragen
        window.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') keys.w = 1;
            if(e.code === 'KeyS') keys.s = 1;
            if(e.code === 'KeyA') keys.a = 1;
            if(e.code === 'KeyD') keys.d = 1;
            // Springen nach OBEN: Impuls erhöhen, wenn auf dem Boden gestanden wird
            if(e.code === 'Space' && player.onGround) {
                player.vy = 0.3; 
                player.onGround = false;
            }
        });

        window.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') keys.w = 0;
            if(e.code === 'KeyS') keys.s = 0;
            if(e.code === 'KeyA') keys.a = 0;
            if(e.code === 'KeyD') keys.d = 0;
        });

        window.addEventListener('resize', () => {
            w = window.innerWidth; h = window.innerHeight;
            canvas.width = w; canvas.height = h;
        });

        // Game Loop
        function loop() {
            // 1. PHYSIK & BEWEGUNG UPDATE
            if (locked) {
                let speed = 0.15;
                let forward = keys.w - keys.s;
                let strafe = keys.d - keys.a;

                // Korrigierte Vektorberechnung: W geht immer exakt in Blickrichtung (ry)
                player.x += (Math.sin(player.ry) * forward + Math.cos(player.ry) * strafe) * speed;
                player.z -= (Math.cos(player.ry) * forward - Math.sin(player.ry) * strafe) * speed;
            }

            // Gravitation anwenden
            if (!player.onGround) {
                player.vy -= 0.015; // Zieht den Spieler pro Frame nach unten
                player.y += player.vy;
                
                // Landung auf dem Boden (y = 1.8 Augenhöhe)
                if (player.y <= 1.8) {
                    player.y = 1.8;
                    player.vy = 0;
                    player.onGround = true;
                }
            }

            // 2. ZEICHNEN (RENDERER)
            // Himmelhintergrund
            ctx.fillStyle = '#efd1b5';
            ctx.fillRect(0, 0, w, h);

            // Dynamischer Horizont basierend auf dem vertikalen Blickwinkel (rx)
            let pitchOffset = Math.tan(player.rx) * (h / 2);
            ctx.fillStyle = '#33aa33';
            ctx.fillRect(0, h/2 + pitchOffset, w, h);

            // Objekte transformieren und nach Tiefenabstand sortieren
            const renderedObjects = [];

            objects.forEach(obj => {
                let dx = obj.x - player.x;
                let dy = -player.y; 
                let dz = obj.z - player.z;

                // Rotation um die Spielerachse anwenden
                let rx = dx * Math.cos(-player.ry) - dz * Math.sin(-player.ry);
                let rz = dx * Math.sin(-player.ry) + dz * Math.cos(-player.ry);

                // Nur Objekte vor der Kamera berechnen
                if (rz > 0.5) {
                    renderedObjects.push({ obj, rx, rz, dy });
                }
            });

            // Painter's Algorithm: Weiter entfernte Objekte zuerst zeichnen
            renderedObjects.sort((a, b) => b.rz - a.rz);

            // Volumenkörper zeichnen
            renderedObjects.forEach(({ obj, rx, rz, dy }) => {
                let fov = 500; 
                let scale = fov / rz;

                let screenX = w / 2 + rx * scale;
                let screenY = h / 2 + (dy * scale) + pitchOffset;

                let boxW = obj.w * scale;
                let boxH = obj.h * scale;

                // Schattenwurf am Boden
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                ctx.fillRect(screenX - boxW / 2, h / 2 + (-player.y * scale) + pitchOffset, boxW, 10);

                // Objektflächen zeichnen
                ctx.fillStyle = obj.c;
                ctx.fillRect(screenX - boxW / 2, screenY, boxW, boxH);

                // Struktur-Konturen für 3D-Gefühl
                ctx.strokeStyle = 'rgba(0,0,0,0.25)';
                ctx.lineWidth = 1.5;
                ctx.strokeRect(screenX - boxW / 2, screenY, boxW, boxH);
            });

            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
