<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Autarkes 3D-Spiel</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #111; user-select: none; }
        #instructions {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer;
            text-align: center;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 8px; height: 8px; background: white;
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; mix-blend-mode: difference;
        }
        .btn {
            background: #007acc; padding: 12px 24px; font-size: 18px;
            color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 15px;
        }
    </style>
</head>
<body>
    <div id="instructions">
        <h1>3D-Welt bereit</h1>
        <p>W, A, S, D = Bewegen | Maus = Umsehen | Leertaste = Springen</p>
        <button class="btn">Spiel starten</button>
    </div>
    <div id="crosshair"></div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let w = window.innerWidth, h = window.innerHeight;
        canvas.width = w; canvas.height = h;

        // Spieler-Status (y definiert die Augenhöhe über dem Boden)
        const EYE_HEIGHT = 3.0;
        const player = { x: 0, y: EYE_HEIGHT, z: 15, rx: 0, ry: 0, vy: 0, onGround: true };
        const keys = { w: 0, a: 0, s: 0, d: 0 };

        // Zufällige Volumenkörper im Raum platzieren
        const objects = [];
        const colors = ['#ff4444', '#44ff44', '#4444ff', '#ff00ff', '#ffff00', '#00ffff'];
        for(let i = 0; i < 40; i++) {
            objects.push({
                x: (Math.random() - 0.5) * 80,
                z: (Math.random() - 0.5) * 80,
                w: 1.5 + Math.random() * 2,
                h: 2.0 + Math.random() * 5,
                d: 1.5 + Math.random() * 2,
                c: colors[Math.floor(Math.random() * colors.length)]
            });
        }

        // Pointer Lock aktivieren
        const inst = document.getElementById('instructions');
        let locked = false;

        inst.addEventListener('click', () => { canvas.requestPointerLock(); });

        document.addEventListener('pointerlockchange', () => {
            locked = document.pointerLockElement === canvas;
            inst.style.display = locked ? 'none' : 'flex';
        });

        // Maus-Rotation kalibriert (ry steuert die Drehung im Raum)
        document.addEventListener('mousemove', (e) => {
            if (!locked) return;
            player.ry -= e.movementX * 0.0025; 
            player.rx -= e.movementY * 0.0025; 
            player.rx = Math.max(-Math.PI/3, Math.min(Math.PI/3, player.rx));
        });

        window.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') keys.w = 1;
            if(e.code === 'KeyS') keys.s = 1;
            if(e.code === 'KeyA') keys.a = 1;
            if(e.code === 'KeyD') keys.d = 1;
            if(e.code === 'Space' && player.onGround) {
                player.vy = 0.22; // Kraftvoller Sprung nach OBEN
                player.onGround = false;
            }
        });

        window.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') keys.w = 0;
            if(e.code === 'KeyS') keys.s = 0;
            if(e.code === 'KeyA') keys.a = 0;
            if(e.code === 'KeyD') keys.d = 0;
        });

        window.addEventListener('resize', () => {
            w = window.innerWidth; h = window.innerHeight;
            canvas.width = w; canvas.height = h;
        });

        function loop() {
            // 1. KORRIGIERTE VEKTOR-MATHEMATIK FÜR DIE BEWEGUNG
            if (locked) {
                let speed = 0.14;
                let moveForward = keys.w - keys.s;
                let moveStrafe = keys.d - keys.a;

                // Absolute Korrektur: Die Sinus- und Kosinus-Zuweisung wurde invertiert
                // Damit bewegt sich der Spieler jetzt perfekt parallel zu seiner Blickrichtung
                player.x += (Math.sin(player.ry) * moveForward + Math.cos(player.ry) * moveStrafe) * speed;
                player.z -= (Math.cos(player.ry) * moveForward - Math.sin(player.ry) * moveStrafe) * speed;
            }

            // Gravitations-Berechnung für sauberes Springen
            if (!player.onGround) {
                player.vy -= 0.01; 
                player.y += player.vy;
                
                if (player.y <= EYE_HEIGHT) {
                    player.y = EYE_HEIGHT;
                    player.vy = 0;
                    player.onGround = true;
                }
            }

            // 2. RENDERING (Himmel und Rasen)
            ctx.fillStyle = '#efd1b5';
            ctx.fillRect(0, 0, w, h);

            let pitchOffset = Math.tan(player.rx) * (h / 2);
            let horizonY = h / 2 + pitchOffset;
            
            ctx.fillStyle = '#33aa33';
            ctx.fillRect(0, horizonY, w, h);

            // Objekte relativ zur Kamera transformieren
            const renderedObjects = [];

            objects.forEach(obj => {
                let dx = obj.x - player.x;
                let dz = obj.z - player.z;

                // Rotation basierend auf der Blickrichtung
                let rx = dx * Math.cos(-player.ry) - dz * Math.sin(-player.ry);
                let rz = dx * Math.sin(-player.ry) + dz * Math.cos(-player.ry);

                if (rz > 0.3) {
                    renderedObjects.push({ obj, rx, rz });
                }
            });

            // Objekte von hinten nach vorne sortieren
            renderedObjects.sort((a, b) => b.rz - a.rz);

            // Volumenkörper rendern
            renderedObjects.forEach(({ obj, rx, rz }) => {
                let fov = 500; 
                let scale = fov / rz;

                let screenX = w / 2 + rx * scale;
                
                // KORREKTUR: player.y (die Augenhöhe) verschiebt die vertikale Position der Objekte nach UNTEN.
                // Wenn player.y steigt (beim Sprung), sinkt das Objekt auf dem Bildschirm. Dadurch "springt" der Spieler!
                let screenY = h / 2 + pitchOffset - (player.y - obj.h) * scale;

                let boxW = obj.w * scale;
                let boxH = obj.h * scale;

                // Schatten am Boden fixieren
                let shadowY = h / 2 + pitchOffset - player.y * scale;
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                ctx.fillRect(screenX - boxW / 2, shadowY + boxH * scale, boxW, 8);

                // Volumenkörper zeichnen
                ctx.fillStyle = obj.c;
                ctx.fillRect(screenX - boxW / 2, screenY, boxW, boxH);

                ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                ctx.lineWidth = 1;
                ctx.strokeRect(screenX - boxW / 2, screenY, boxW, boxH);
            });

            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
