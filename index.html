<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sci-Fi Weltraum-Simulator v3</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; background: #000; user-select: none; }
        #canvas-container { position: relative; width: 100vw; height: 100vh; cursor: none; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* Cockpit HUD Overlay */
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; box-sizing: border-box;
            border: 20px solid #151515;
            box-shadow: inset 0 0 100px rgba(0,255,255,0.1);
        }
        .hud-panel {
            position: absolute; background: rgba(5, 15, 15, 0.85);
            border: 2px solid #00ffcc; color: #00ffcc; padding: 15px;
            border-radius: 5px; box-shadow: 0 0 15px rgba(0,250,200,0.2);
        }
        #hud-left { bottom: 40px; left: 40px; width: 180px; }
        #hud-right { bottom: 40px; right: 40px; width: 180px; text-align: right; }
        
        /* Fadenkreuz folgt der Maus korrekt */
        #crosshair {
            position: absolute; width: 34px; height: 34px;
            border: 2px solid #ff3333; border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none;
            box-shadow: 0 0 8px #ff3333; z-index: 20;
        }
        #crosshair::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 4px; height: 4px; background: #ff3333;
            transform: translate(-50%, -50%); border-radius: 50%;
        }
        #intro {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            color: #00ffcc; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; z-index: 100;
        }
        .btn {
            background: #00aa88; color: black; font-weight: bold; padding: 12px 30px;
            font-size: 18px; border: none; border-radius: 4px; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="intro">
        <h1>HEAVY INTERCEPTOR COCKPIT</h1>
        <p>W / S = Nicken | Q / E = Gieren (Dreht sich mit der Ansicht!)</p>
        <p>A / D = Rollen | SCHWERE TRÄGHEIT AKTIV</p>
        <p>LEERTASTE = Hauptantrieb | SHIFT = Bremsen</p>
        <p>MAUS = Fadenkreuz bewegen | LINKSKLICK = Dual-Laser abfeuern</p>
        <button class="btn" onclick="startSim()">SYSTEME STARTEN</button>
    </div>

    <div id="canvas-container">
        <canvas id="spaceCanvas"></canvas>
        <div id="hud">
            <div id="hud-left" class="hud-panel">
                <div>SPEED: <span id="val-speed">0</span> km/h</div>
                <div>THRUST: <span id="val-thrust">0</span>%</div>
            </div>
            <div id="hud-right" class="hud-panel">
                <div>LASER: <span id="val-laser">READY</span></div>
                <div>SECTOR: <span id="val-coords">0,0</span></div>
            </div>
        </div>
        <div id="crosshair"></div>
    </div>

    <script>
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');
        const crosshair = document.getElementById('crosshair');

        let w = window.innerWidth, h = window.innerHeight;
        canvas.width = w; canvas.height = h;

        let simRunning = false;
        let mouseX = w / 2, mouseY = h / 2;

        // Spieler-Physik-Status
        const player = {
            x: 0, y: 0, z: 50,
            pitch: 0, yaw: 0, roll: 0,
            vPitch: 0, vYaw: 0, vRoll: 0,
            speed: 0, targetSpeed: 0
        };

        const keys = { w:0, s:0, a:0, d:0, q:0, e:0, space:0, shift:0 };
        const stars = [];
        const planets = [];
        const lasers = [];

        // Himmelskörper generieren
        for(let i=0; i<350; i++) {
            stars.push({ x:(Math.random()-0.5)*1200, y:(Math.random()-0.5)*1200, z:(Math.random()-0.5)*1200, size:0.5+Math.random()*1.5 });
        }
        const colors = ['#bf8d3c', '#2b82c9', '#c1440e', '#4f725d', '#a5a5a5'];
        for(let i=0; i<25; i++) {
            planets.push({
                x:(Math.random()-0.5)*500, y:(Math.random()-0.5)*500, z:(Math.random()-0.5)*500,
                r:6+Math.random()*14, c:colors[Math.floor(Math.random()*colors.length)], hasRing:Math.random()>0.5
            });
        }

        // Fadenkreuz-Maussteuerung FIX
        document.getElementById('canvas-container').addEventListener('mousemove', (e) => {
            mouseX = e.clientX; 
            mouseY = e.clientY;
            crosshair.style.left = mouseX + 'px';
            crosshair.style.top = mouseY + 'px';
        });

        // Tastatur fangen
        window.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') keys.w = 1; if(e.code === 'KeyS') keys.s = 1;
            if(e.code === 'KeyA') keys.a = 1; if(e.code === 'KeyD') keys.d = 1;
            if(e.code === 'KeyQ') keys.q = 1; if(e.code === 'KeyE') keys.e = 1;
            if(e.code === 'Space') keys.space = 1; if(e.code === 'ShiftLeft') keys.shift = 1;
        });
        window.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') keys.w = 0; if(e.code === 'KeyS') keys.s = 0;
            if(e.code === 'KeyA') keys.a = 0; if(e.code === 'KeyD') keys.d = 0;
            if(e.code === 'KeyQ') keys.q = 0; if(e.code === 'KeyE') keys.e = 0;
            if(e.code === 'Space') keys.space = 0; if(e.code === 'ShiftLeft') keys.shift = 0;
        });

        function startSim() {
            document.getElementById('intro').style.display = 'none';
            simRunning = true;
            loop();
        }

        // Dual-Laser gleichzeitig abfeuern
        document.getElementById('canvas-container').addEventListener('mousedown', () => {
            if(!simRunning) return;
            lasers.push({ x: player.x, y: player.y, z: player.z, side: 'left', tx: mouseX, ty: mouseY, t: 0 });
            lasers.push({ x: player.x, y: player.y, z: player.z, side: 'right', tx: mouseX, ty: mouseY, t: 0 });
        });

        window.addEventListener('resize', () => {
            w = window.innerWidth; h = window.innerHeight;
            canvas.width = w; canvas.height = h;
        });
        // --- PHYSIK (DYNAMISCHE ROTATION & SCHWERE TRÄGHEIT) ---
        function loop() {
            if (!simRunning) return;

            // Extrem hohe Trägheits-Koeffizienten für zähflüssigen Raumschiffdrift
            const rAccel = 0.0006; 
            const rFriction = 0.98; 

            // Mathematische Achsen-Transformation:
            // Wir berechnen, wie viel "Nicken" und "Gieren" relativ zum aktuellen Roll-Winkel (player.roll) wirken müssen.
            let cosR = Math.cos(player.roll);
            let sinR = Math.sin(player.roll);

            let localPitchInput = keys.w - keys.s;
            let localYawInput = keys.q - keys.e;

            // Eingaben transformieren, damit W/S immer der lokalen Cockpithöhe folgt!
            let worldPitchAccel = localPitchInput * cosR - localYawInput * sinR;
            let worldYawAccel = localPitchInput * sinR + localYawInput * cosR;

            player.vPitch += worldPitchAccel * rAccel;
            player.vYaw += worldYawAccel * rAccel;

            if (keys.a) player.vRoll -= 0.0012;
            if (keys.d) player.vRoll += 0.0012;

            player.vPitch *= rFriction;
            player.vYaw *= rFriction;
            player.vRoll *= 0.94;

            player.pitch += player.vPitch;
            player.yaw += player.vYaw;
            player.roll += player.vRoll;

            // Vorwärtsschub berechnen
            if (keys.space) player.targetSpeed = 1.0;
            else if (keys.shift) player.targetSpeed = -0.2;
            else player.targetSpeed *= 0.99; 

            player.speed += (player.targetSpeed - player.speed) * 0.015; // Noch trägere Beschleunigung

            // Positions-Update im All basierend auf echten 3D-Flugvektoren
            let cp = Math.cos(player.pitch), sp = Math.sin(player.pitch);
            let cy = Math.cos(player.yaw), sy = Math.sin(player.yaw);

            player.x += (sy * cp) * player.speed;
            player.y += sp * player.speed;
            player.z += (-cy * cp) * player.speed;

            // HUD aktualisieren
            document.getElementById('val-speed').innerText = Math.round(Math.abs(player.speed) * 21500);
            document.getElementById('val-thrust').innerText = Math.round((player.speed + 0.2) / 1.2 * 100);
            document.getElementById('val-coords').innerText = `${Math.round(player.x/2)},${Math.round(player.z/2)}`;

            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, w, h);

            let fov = 450;
            const cr = Math.cos(player.roll), sr = Math.sin(player.roll);

            function transformPoint(px, py, pz) {
                let dx = px - player.x, dy = py - player.y, dz = pz - player.z;
                let r1x = dx * Math.cos(-player.yaw) - dz * Math.sin(-player.yaw);
                let r1z = dx * Math.sin(-player.yaw) + dz * Math.cos(-player.yaw);
                let r2y = dy * Math.cos(-player.pitch) - r1z * Math.sin(-player.pitch);
                let r2z = dy * Math.sin(-player.pitch) + r1z * Math.cos(-player.pitch);
                return { x: r1x * cr - r2y * sr, y: r1x * sr + r2y * cr, z: r2z };
            }

            // Sterne zeichnen
            ctx.fillStyle = '#ffffff';
            stars.forEach(star => {
                let t = transformPoint(star.x, star.y, star.z);
                if (t.z > 1) {
                    let sx = w / 2 + (t.x * fov) / t.z, sy = h / 2 + (t.y * fov) / t.z;
                    if (sx >= 0 && sx <= w && sy >= 0 && sy <= h) ctx.fillRect(sx, sy, star.size, star.size);
                }
            });

            // Planeten transformieren & ordnen
            const renderedPlanets = [];
            planets.forEach(p => {
                let t = transformPoint(p.x, p.y, p.z);
                if (t.z > 2) renderedPlanets.push({ p, t });
            });
            renderedPlanets.sort((a, b) => b.t.z - a.t.z);

            // Planeten zeichnen
            renderedPlanets.forEach(({ p, t }) => {
                let scale = fov / t.z, sx = w / 2 + t.x * scale, sy = h / 2 + t.y * scale, radius = p.r * scale;
                if (radius > 1) {
                    if (p.hasRing) {
                        ctx.beginPath(); ctx.ellipse(sx, sy, radius * 1.9, radius * 0.4, player.roll + Math.PI/6, 0, 2 * Math.PI);
                        ctx.strokeStyle = 'rgba(210, 190, 150, 0.4)'; ctx.lineWidth = radius * 0.12; ctx.stroke();
                    }
                    ctx.beginPath(); ctx.arc(sx, sy, radius, 0, 2 * Math.PI); ctx.fillStyle = p.c; ctx.fill();
                    let grad = ctx.createRadialGradient(sx-radius*0.2, sy-radius*0.2, radius*0.05, sx, sy, radius);
                    grad.addColorStop(0, 'rgba(255,255,255,0.2)'); grad.addColorStop(1, 'rgba(0,0,0,0.85)');
                    ctx.beginPath(); ctx.arc(sx, sy, radius, 0, 2 * Math.PI); ctx.fillStyle = grad; ctx.fill();
                }
            });

            // --- LASERSTRAHLEN RENDERN ---
            ctx.lineWidth = 4;
            for (let i = lasers.length - 1; i >= 0; i--) {
                let l = lasers[i];
                l.t += 0.07;

                let startX = (l.side === 'left') ? w * 0.15 : w * 0.85;
                let startY = h * 0.92;

                ctx.beginPath();
                ctx.moveTo(startX + (l.tx - startX) * (l.t - 0.12), startY + (l.ty - startY) * (l.t - 0.12));
                ctx.lineTo(startX + (l.tx - startX) * l.t, startY + (l.ty - startY) * l.t);
                ctx.strokeStyle = '#ff1111';
                ctx.stroke();

                if (l.t >= 1.0) lasers.splice(i, 1);
            }

            // --- PLASTISCHE 3D-LASERKANONEN ---
            const drawHeavyGun = (baseX, baseY, isLeft) => {
                ctx.save();
                ctx.translate(baseX, baseY);
                
                let angle = Math.atan2(mouseY - baseY, mouseX - baseX);
                ctx.rotate(angle);

                // 1. Schattierte Gelenkbasis (3D-Tiefe durch Gradients)
                let baseGrad = ctx.createLinearGradient(-15, -25, -15, 25);
                baseGrad.addColorStop(0, '#3a3a3a'); baseGrad.addColorStop(0.5, '#1e1e1e'); baseGrad.addColorStop(1, '#0f0f0f');
                ctx.fillStyle = baseGrad;
                ctx.strokeStyle = '#00ffcc';
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(-10, 0, 22, 0, 2*Math.PI); ctx.fill(); ctx.stroke();

                // 2. Massives Geschützgehäuse
                let bodyGrad = ctx.createLinearGradient(-10, -15, 25, 15);
                bodyGrad.addColorStop(0, '#555555'); bodyGrad.addColorStop(0.4, '#2d2d2d'); bodyGrad.addColorStop(1, '#151515');
                ctx.fillStyle = bodyGrad;
                ctx.fillRect(-5, -14, 35, 28);
                ctx.strokeRect(-5, -14, 35, 28);

                // 3. Hydraulischer Doppel-Lauf (Räumlich versetzt)
                let barrelGrad = ctx.createLinearGradient(25, -6, 25, 6);
                barrelGrad.addColorStop(0, '#777777'); barrelGrad.addColorStop(0.5, '#3a3a3a'); barrelGrad.addColorStop(1, '#222222');
                ctx.fillStyle = barrelGrad;
                
                // Oberer und unterer Lauf für echtes Doppelgeschütz-Feeling
                ctx.fillRect(25, -9, 45, 6);
                ctx.strokeRect(25, -9, 45, 6);
                ctx.fillRect(25, 3, 45, 6);
                ctx.strokeRect(25, 3, 45, 6);
                
                // Mündungsfeuer-Emitter (Glühendes Rot-Orange)
                ctx.fillStyle = '#ff4500';
                ctx.fillRect(70, -8, 5, 4);
                ctx.fillRect(70, 4, 5, 4);
                
                ctx.restore();
            };

            drawHeavyGun(w * 0.15, h * 0.92, true);
            drawHeavyGun(w * 0.85, h * 0.92, false);

            // Statisches HUD-Visier
            ctx.strokeStyle = 'rgba(0, 255, 204, 0.15)';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(w/2, h/2, 50, 0, 2*Math.PI); ctx.stroke();

            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
